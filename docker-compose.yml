services:
  app:
    image: local-git-monitor:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-git-monitor
    mem_limit: 128m
    mem_reservation: 64m
    ports:
      - "8010:8010"
    env_file:
      - .env
    volumes:
      - ${HOME}:${HOME}
      - ~/.ssh:/root/.ssh:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.local-git-monitor.rule=PathPrefix(`${APP_BASE_PATH}`)
      - traefik.http.routers.local-git-monitor.entrypoints=websecure
      - traefik.http.routers.local-git-monitor.tls=true
      - traefik.http.services.local-git-monitor.loadbalancer.server.port=8010
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
